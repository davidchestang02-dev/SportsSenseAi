name: Apply D1 Schema

on:
  push:
    branches: [main]
    paths:
      - "backend/schema/**"

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend dependencies
        run: npm install
        working-directory: backend
      - name: Apply D1 migrations (staging)
        run: npx wrangler d1 migrations apply sportssenseai-mlb --env staging
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  migrate-production:
    runs-on: ubuntu-latest
    needs: migrate-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend dependencies
        run: npm install
        working-directory: backend
      - name: Apply D1 migrations (production)
        run: npx wrangler d1 migrations apply sportssenseai-mlb --env production
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
