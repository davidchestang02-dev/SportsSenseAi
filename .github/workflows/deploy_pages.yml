name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy_pages.yml"

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build Cloudflare Pages app
        run: npm run build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.SSA_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 71c315a0acd5896e9ca591df7d3e188b
        run: npx wrangler pages deploy dist --project-name sportssenseai-web
